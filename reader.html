<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Comic | Comic Pur</title>
<style>
:root { --primary: #00d4ff; --dark: #070b19; --header-bg: rgba(7, 11, 25, 0.95); }
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
body { background-color: var(--dark); color: white; min-height: 100vh; overflow-x: hidden; }

/* HEADER */
header { 
    position: fixed; top: 0; width: 100%; z-index: 100;
    padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; 
    background: var(--header-bg); border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
    backdrop-filter: blur(10px); transition: transform 0.3s ease;
}
.header-hidden { transform: translateY(-100%); }
.brand-text { font-size: 18px; font-weight: 900; color: white; text-decoration: none; letter-spacing: 1px;}
.brand-text span { color: var(--primary); }
.chapter-title { font-size: 14px; font-weight: 600; color: #aaa; text-align: center; flex-grow: 1; margin: 0 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.back-btn { background: transparent; color: white; font-size: 20px; cursor: pointer; text-decoration: none; }

/* READER CONTAINER */
.reader-wrapper { margin-top: 60px; display: flex; flex-direction: column; align-items: center; width: 100%; background: #000; min-height: 100vh;}
.reader-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; }
/* Webtoon style: block display and no margin to remove any gaps between sliced images */
.comic-page { width: 100%; display: block; margin: 0; padding: 0; object-fit: contain; min-height: 200px; background: #111; }

/* PAGE COUNTER BADGE */
.page-counter {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: rgba(0, 0, 0, 0.7); border: 1px solid var(--primary);
    color: white; padding: 8px 15px; border-radius: 20px;
    font-weight: 700; font-size: 14px; backdrop-filter: blur(5px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
    transition: opacity 0.3s;
}

/* LOADER */
.loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; width: 100%; }
.loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* NAVIGATION FOOTER */
.chapter-nav { width: 100%; max-width: 800px; margin: 0 auto; padding: 30px 20px; display: flex; justify-content: space-between; gap: 15px; background: var(--dark);}
.nav-btn { flex: 1; padding: 12px; text-align: center; background: #111827; color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.2s; }
.nav-btn:hover { background: var(--primary); color: #000; }
.nav-btn.disabled { opacity: 0.5; pointer-events: none; }

</style>
</head>
<body>

<header id="topHeader">
  <a href="index.html" class="back-btn">←</a>
  <div class="chapter-title" id="headerTitle">Loading Chapter...</div>
  <a href="index.html" class="brand-text">C<span>P</span></a>
</header>

<div class="reader-wrapper">
    <div id="loader" class="loader-container">
        <div class="loader"></div>
        <p style="color: #aaa; font-size: 14px;">Loading high-quality pages...</p>
    </div>
    <div class="reader-container" id="readerContainer">
        <!-- Images will be injected here -->
    </div>
    
    <div class="chapter-nav" id="chapterNav" style="display: none;">
        <a href="#" class="nav-btn" id="prevBtn">← Previous</a>
        <a href="#" class="nav-btn" id="nextBtn">Next →</a>
    </div>
</div>

<div class="page-counter" id="pageCounter" style="display: none;">1 / 1</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const readerContainer = document.getElementById('readerContainer');
  const loader = document.getElementById('loader');
  const pageCounter = document.getElementById('pageCounter');
  const headerTitle = document.getElementById('headerTitle');
  const chapterNav = document.getElementById('chapterNav');
  
  let totalPages = 0;

  // URL se Comic ID aur Chapter ID nikalna
  // Example URL: reader.html?comic=ishq_par_jor_nahi&chapter=ch1
  const urlParams = new URLSearchParams(window.location.search);
  const comicId = urlParams.get('comic');
  const chapterId = urlParams.get('chapter');

  async function loadChapter() {
      if (!comicId || !chapterId) {
          headerTitle.innerText = "Error: Invalid Link";
          loader.innerHTML = "<p>Comic or Chapter not specified in URL.</p>";
          return;
      }

      try {
          // Firebase se data fetch karna
          // Note: Apne database structure ke hisaab se path adjust kar lena
          const chapterRef = doc(db, "comics", comicId, "chapters", chapterId);
          const chapterSnap = await getDoc(chapterRef);

          if (chapterSnap.exists()) {
              const data = chapterSnap.data();
              const images = data.images || []; // Array of image URLs
              totalPages = images.length;

              headerTitle.innerText = data.title || `Chapter ${chapterId}`;
              
              if (totalPages === 0) {
                  loader.innerHTML = "<p>No pages found in this chapter.</p>";
                  return;
              }

              loader.style.display = "none";
              pageCounter.style.display = "block";
              pageCounter.innerText = `1 / ${totalPages}`;
              chapterNav.style.display = "flex";

              renderImages(images);
              setupIntersectionObserver();

          } else {
              headerTitle.innerText = "Chapter Not Found";
              loader.innerHTML = "<p>The requested chapter does not exist.</p>";
          }
      } catch (error) {
          console.error("Error loading chapter:", error);
          loader.innerHTML = "<p>Error loading chapter. Check console.</p>";
      }
  }

  function renderImages(images) {
      images.forEach((imgUrl, index) => {
          const imgElement = document.createElement('img');
          imgElement.src = imgUrl;
          imgElement.className = 'comic-page';
          imgElement.dataset.index = index + 1; // Counter ke liye save kar rahe hain
          imgElement.loading = "lazy"; // Fast loading ke liye
          
          // Image load hone par background color hata do
          imgElement.onload = () => { imgElement.style.background = 'transparent'; };
          
          readerContainer.appendChild(imgElement);
      });
  }

  // 🔥 Yahan hai Counter ka Smart Magic 🔥
  function setupIntersectionObserver() {
      const observerOptions = {
          root: null,
          rootMargin: "0px",
          threshold: 0.3 // Jab 30% image screen par aaye toh counter update ho
      };

      const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
              if (entry.isIntersecting) {
                  const currentPage = entry.target.dataset.index;
                  pageCounter.innerText = `${currentPage} / ${totalPages}`;
              }
          });
      }, observerOptions);

      const pages = document.querySelectorAll('.comic-page');
      pages.forEach(page => observer.observe(page));
  }

  // Header ko scroll karne par chupana (Immersive feel ke liye)
  let lastScrollY = window.scrollY;
  const header = document.getElementById('topHeader');
  
  window.addEventListener('scroll', () => {
      if (window.scrollY > 100 && window.scrollY > lastScrollY) {
          header.classList.add('header-hidden'); // Niche scroll = Hide header
      } else {
          header.classList.remove('header-hidden'); // Upar scroll = Show header
      }
      lastScrollY = window.scrollY;
  });

  // Start process
  loadChapter();

</script>
</body>
</html>
