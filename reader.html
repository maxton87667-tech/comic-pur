<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Chapter | Comic Pur</title>
<style>
  :root { 
    --primary: #00d4ff; --dark: #000000; /* Pure black for immersive reading */
    --ui-bg: rgba(17, 24, 39, 0.9);
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background-color: var(--dark); color: white; min-height: 100vh; overflow-x: hidden; }

  /* OVERLAY UI TRANSITIONS */
  .ui-overlay {
    position: fixed; left: 0; right: 0; z-index: 100;
    background: var(--ui-bg); backdrop-filter: blur(10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .ui-hidden { opacity: 0; pointer-events: none; }
  .ui-hidden.header-bar { transform: translateY(-100%); }
  .ui-hidden.bottom-bar { transform: translateY(100%); }

  /* HEADER */
  .header-bar {
    top: 0; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
    border-bottom-color: rgba(0, 212, 255, 0.2);
  }
  .back-btn { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 15px; }
  .chapter-title { font-weight: 800; font-size: 16px; color: white; text-align: center; flex-grow: 1; padding: 0 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* BOTTOM CONTROL BAR */
  .bottom-bar {
    bottom: 0; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
    border-top-color: rgba(0, 212, 255, 0.2);
  }
  .nav-btn { 
    background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); 
    padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 14px; 
    cursor: pointer; transition: 0.2s; 
  }
  .nav-btn:hover:not(:disabled) { background: rgba(0,212,255,0.1); border-color: var(--primary); color: var(--primary); }
  .nav-btn:disabled { color: #555; border-color: #333; cursor: not-allowed; }
  
  .page-counter { font-size: 14px; font-weight: 900; color: var(--primary); letter-spacing: 1px; }

  /* COMIC READER CONTAINER */
  .reader-container {
    max-width: 800px; width: 100%; margin: 0 auto; 
    display: flex; flex-direction: column; 
    min-height: 100vh; cursor: pointer; /* Pointer to indicate it's clickable */
  }
  
  /* Images stitched together seamlessly */
  .comic-page {
    width: 100%; height: auto; display: block; margin: 0; padding: 0;
    min-height: 300px; background: #111; /* Dark skeleton while loading */
  }

  /* LOADER */
  .loader-box { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: #000; z-index: 50; flex-direction: column; gap: 15px;}
  .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loaderBox" class="loader-box">
    <div class="spinner"></div>
    <div style="color:var(--primary); font-weight:bold; font-size: 14px;" id="loaderText">Preparing Chapter...</div>
</div>

<header id="headerBar" class="ui-overlay header-bar">
    <a href="#" id="backBtn" class="back-btn">← Back</a>
    <div id="topTitle" class="chapter-title">Loading...</div>
    <div style="width: 40px;"></div> </header>

<div id="readerContainer" class="reader-container" onclick="toggleUI()">
    </div>

<div id="bottomBar" class="ui-overlay bottom-bar">
    <button id="prevBtn" class="nav-btn" onclick="changeChapter(-1)">← Prev</button>
    <div id="pageCounter" class="page-counter">1 / -</div>
    <button id="nextBtn" class="nav-btn" onclick="changeChapter(1)">Next →</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let comicId = "";
  let currentChapterIndex = 0;
  let comicData = null;
  let totalPages = 0;
  let uiVisible = true;

  // 1. Check Authentication & Premium Pass (Security)
  onAuthStateChanged(auth, async (user) => {
      const urlParams = new URLSearchParams(window.location.search);
      comicId = urlParams.get('comic');
      currentChapterIndex = parseInt(urlParams.get('ch'));

      if(!comicId || isNaN(currentChapterIndex)) {
          alert("Invalid URL!"); window.location.href = "index.html"; return;
      }
      
      document.getElementById('backBtn').href = `comic.html?id=${comicId}`;

      if (user) {
          try {
              const uSnap = await getDoc(doc(db, "users", user.uid));
              // Agar pass nahi hai ya expire ho gaya hai, wapas comic page par phenk do
              if (!uSnap.exists() || uSnap.data().accessExpiresAt < Date.now()) {
                  window.location.href = `comic.html?id=${comicId}`;
                  return;
              }
              // Agar pass valid hai, toh comic load karo
              loadChapterData();
          } catch(e) { console.error(e); }
      } else {
          // Bina login aaye toh wapas bhejo
          window.location.href = `comic.html?id=${comicId}`;
      }
  });

  // 2. Fetch Comic and Render Images
  async function loadChapterData() {
      try {
          const docSnap = await getDoc(doc(db, "comics", comicId));
          if(docSnap.exists()) {
              comicData = docSnap.data();
              const episodes = comicData.episodes || [];
              
              if(currentChapterIndex < 0 || currentChapterIndex >= episodes.length) {
                  document.getElementById('loaderText').innerText = "Chapter does not exist!";
                  return;
              }

              const currentChapter = episodes[currentChapterIndex];
              const imageUrls = currentChapter.urls || [];
              totalPages = imageUrls.length;

              // Update UI Texts
              document.getElementById('topTitle').innerText = `Ch ${currentChapterIndex + 1}: ${currentChapter.title}`;
              document.getElementById('pageCounter').innerText = `1 / ${totalPages}`;
              
              // Handle Prev/Next Buttons
              document.getElementById('prevBtn').disabled = currentChapterIndex === 0;
              document.getElementById('nextBtn').disabled = currentChapterIndex === (episodes.length - 1);

              renderImages(imageUrls);
              
          } else {
              document.getElementById('loaderText').innerText = "Comic Not Found!";
          }
      } catch (err) {
          document.getElementById('loaderText').innerText = "Database Error!";
      }
  }

  function renderImages(urls) {
      const container = document.getElementById('readerContainer');
      container.innerHTML = "";

      if(urls.length === 0) {
          container.innerHTML = `<div style="color:white; padding: 50px; text-align:center;">No pages uploaded for this chapter.</div>`;
          document.getElementById('loaderBox').style.display = "none";
          return;
      }

      urls.forEach((url, i) => {
          // data-page attribute zaroori hai observer ke liye
          container.innerHTML += `<img src="${url}" class="comic-page" data-page="${i + 1}" alt="Page ${i+1}" loading="lazy">`;
      });

      document.getElementById('loaderBox').style.display = "none";
      
      // Images DOM mein aane ke baad Observer start karo
      setupScrollObserver();
  }

  // 3. UI Toggle Logic (Full Screen Reading)
  window.toggleUI = () => {
      uiVisible = !uiVisible;
      const header = document.getElementById('headerBar');
      const bottom = document.getElementById('bottomBar');
      
      if(uiVisible) {
          header.classList.remove('ui-hidden');
          bottom.classList.remove('ui-hidden');
      } else {
          header.classList.add('ui-hidden');
          bottom.classList.add('ui-hidden');
      }
  };

  // 4. Live Page Tracker (Intersection Observer)
  function setupScrollObserver() {
      const pages = document.querySelectorAll('.comic-page');
      
      // Observer detect karega ki konsi image screen par (viewport mein) 50% se zyada dikh rahi hai
      const observerOptions = { root: null, rootMargin: '0px', threshold: 0.5 };
      
      const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
              if(entry.isIntersecting) {
                  const currentPageNumber = entry.target.getAttribute('data-page');
                  document.getElementById('pageCounter').innerText = `${currentPageNumber} / ${totalPages}`;
              }
          });
      }, observerOptions);

      pages.forEach(page => observer.observe(page));
  }

  // 5. Change Chapter Logic
  window.changeChapter = (step) => {
      const newIndex = currentChapterIndex + step;
      window.location.href = `reader.html?comic=${comicId}&ch=${newIndex}`;
  };
</script>
</body>
</html>
