<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard | Comic Pur</title>
<style>
  :root { 
    --primary: #00d4ff; --dark: #070b19; --card-bg: #111827; 
    --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --purple: #8b5cf6;
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background-color: var(--dark); color: white; display: flex; flex-direction: column; min-height: 100vh; }
  
  header { background: var(--card-bg); padding: 15px 20px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,212,255,0.1); }
  header h2 { color: var(--primary); font-weight: 900; font-size: 22px; letter-spacing: 1px; }
  .logout-btn { background: var(--danger); color: white; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
  .logout-btn:hover { background: #b91c1c; }

  .dashboard { display: grid; grid-template-columns: 1fr; gap: 25px; padding: 25px; max-width: 1300px; margin: 0 auto; width: 100%; }
  @media(min-width: 900px) { .dashboard { grid-template-columns: 1fr 1fr; } }

  .panel { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid rgba(0, 212, 255, 0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
  .panel h3 { margin-bottom: 20px; color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px; font-size: 18px; }

  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-control { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: white; font-size: 14px; outline: none; transition: 0.3s; }
  .form-control:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(0,212,255,0.2); }
  
  .preview-box { display: flex; gap: 15px; margin-top: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border: 1px dashed rgba(255,255,255,0.1); align-items: center; }
  .thumb-img { width: 70px; aspect-ratio: 2/3; object-fit: cover; border-radius: 6px; border: 1px solid var(--primary); background: #222; }

  .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: var(--primary); color: #000; }
  .btn-primary:hover { box-shadow: 0 0 15px rgba(0,212,255,0.5); }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { box-shadow: 0 0 15px rgba(16,185,129,0.5); }
  .btn-secondary { background: #333; color: white; margin-top: 10px; }

  .status-box { margin-top: 15px; padding: 12px; background: rgba(0, 0, 0, 0.4); border-radius: 6px; font-size: 13px; color: var(--primary); border-left: 3px solid var(--primary); display: none; word-wrap: break-word;}

  .chapter-manager-list { background: rgba(0,0,0,0.3); border-radius: 8px; max-height: 250px; overflow-y: auto; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); padding: 5px; }
  .chapter-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(255,255,255,0.02); border-radius: 6px; margin-bottom: 5px; font-size: 13px; border: 1px solid rgba(255,255,255,0.03); }
  
  .mini-btn { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; margin-left: 5px; color: white; transition: 0.2s; }
  .mini-del { background: var(--danger); }

  .comic-list { display: flex; flex-direction: column; gap: 10px; }
  .comic-item { background: rgba(255,255,255,0.02); padding: 12px 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
  .comic-info-layout { display: flex; align-items: center; gap: 15px; }
  .comic-item strong { color: white; font-size: 15px; }
  .comic-item p { color: #aaa; font-size: 12px; margin-top: 2px; }

  .action-btns button { padding: 7px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: 6px; transition: 0.2s; color: white; }
  .btn-sync { background: #2563eb; }
  .btn-chapters { background: var(--purple); }
  .btn-edit { background: var(--warning); color: #000; }
  .btn-delete { background: var(--danger); }

  .mode-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
  .mode-btn { flex: 1; padding: 10px; background: #1e293b; color: #ccc; border: 1px solid transparent; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .mode-btn.active { background: var(--primary); color: #000; box-shadow: 0 0 10px rgba(0,212,255,0.4); }
</style>
</head>
<body>

<header>
  <h2>Comic Pur Admin Dashboard</h2>
  <div style="display: flex; align-items: center; gap: 15px;">
    <span id="adminEmailDisplay" style="color: #ccc; font-size: 14px; font-weight: bold;">Loading...</span>
    <a href="index.html" style="color:var(--primary); text-decoration:none; font-weight:bold;">← Go to Site</a>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </div>
</header>

<div style="max-width: 1300px; width:100%; margin: 15px auto 0 auto; padding: 0 25px;">
    <div id="globalSyncStatus" class="status-box"></div>
</div>

<div class="dashboard">
  
  <div class="panel" style="grid-column: 1 / -1;">
    <h3>Security & API Credentials</h3>
    <div style="display: flex; flex-wrap: wrap; gap: 20px;">
        <div class="form-group" style="flex: 1; min-width: 300px;">
          <label>GitHub Personal Access Token (for auto-sync)</label>
          <input type="password" id="githubTokenField" class="form-control" placeholder="ghp_xxxxxxxxxxxxxxxxx">
          <button class="btn btn-primary" id="saveGhTokenBtn" style="margin-top: 12px;">Save GitHub Token</button>
        </div>

        <div class="form-group" style="flex: 1; min-width: 300px;">
          <label>GPLinks API Key</label>
          <input type="password" id="gpLinksTokenField" class="form-control" placeholder="Paste your GPLinks API Key here...">
          <button class="btn btn-success" id="saveGpTokenBtn" style="margin-top: 12px;">Save API Key to Database</button>
          <div id="apiKeyStatus" class="status-box"></div>
        </div>
    </div>
  </div>
  
  <div class="panel">
    <h3 id="panelTitle">1. Add New Comic</h3>
    <input type="hidden" id="editComicId">
    
    <div class="form-group">
      <label>Comic Title</label>
      <input type="text" id="comicTitle" class="form-control" placeholder="Example: Ishq Par Jor Nahi">
    </div>
    <div class="form-group">
      <label>GitHub Folder Name (Inside 'comics/')</label>
      <input type="text" id="githubFolder" class="form-control" placeholder="Leave blank to auto-generate from title">
    </div>
    <div class="form-group">
      <label>Genre</label>
      <input type="text" id="comicGenre" class="form-control" placeholder="Example: Romance, Action">
    </div>
    <div class="form-group">
      <label>Story Summary / Synopsis</label>
      <textarea id="comicSummary" class="form-control" placeholder="Write full comic description here..." rows="4"></textarea>
    </div>
    <div class="form-group">
      <label>Cover Image URL</label>
      <input type="text" id="comicCover" class="form-control" placeholder="Paste image link here...">
      <div class="preview-box">
         <img id="formCoverPreview" class="thumb-img" src="https://via.placeholder.com/70x105?text=No+Cover" alt="Preview">
         <div><span style="font-size: 12px; color: #888;">Live Cover Preview</span></div>
      </div>
    </div>
    <button class="btn btn-primary" id="saveComicBtn">Save Comic Data</button>
    <button class="btn btn-secondary" id="clearFormBtn" onclick="clearForm()">Clear Form</button>
    <div id="saveStatus" class="status-box"></div>
  </div>

  <div class="panel" id="panelChapterControl">
    <h3>2. Chapter Control Room</h3>
    <div class="form-group">
      <label>Select Target Comic</label>
      <select id="selectComic" class="form-control"><option value="">-- Choose Target Comic --</option></select>
      <div class="preview-box" id="selectorPreviewBox" style="display:none; margin-top:10px;">
         <img id="selectorCoverPreview" class="thumb-img" src="" alt="Preview">
         <div style="flex-grow:1;">
            <span style="font-size: 13px; font-weight: bold; color: var(--primary);" id="selectedTitleTxt">-</span>
            <div style="font-size: 11px; color: #aaa; margin-top:3px;">Manage or append chapters to this comic.</div>
         </div>
      </div>
    </div>

    <div class="form-group" id="chapterManagerSection" style="display: none;">
      <label>Existing Chapters</label>
      <div class="chapter-manager-list" id="chapterManagerList"></div>
    </div>
    
    <div id="uploadFormSection" style="display: none; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 15px;">
      <div class="mode-tabs">
          <button class="mode-btn active" id="btnModeGithub" onclick="setUploadMode('github')">GitHub Auto-Sync</button>
          <button class="mode-btn" id="btnModeCloud" onclick="setUploadMode('cloud')">Cloudinary Upload</button>
      </div>
      <div class="form-group">
        <label>Chapter Title / Number</label>
        <input type="text" id="epTitle" class="form-control" placeholder="Example: Chapter 1">
      </div>
      <div id="cloudArea" style="display: none;">
          <div class="form-group"><label>Select Chapter Images</label><input type="file" id="epImages" class="form-control" multiple accept="image/*"></div>
      </div>
      <div id="githubArea" style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
          <div style="display:flex; gap:10px;">
              <div class="form-group" style="flex:1;"><label>Folder (Comic)</label><input type="text" id="ghComicFolder" class="form-control"></div>
              <div class="form-group" style="flex:1;"><label>Folder (Chapter)</label><input type="text" id="ghChapterFolder" class="form-control" placeholder="Ch1"></div>
          </div>
          <div style="display:flex; gap:10px;">
              <div class="form-group" style="flex:1;"><label>Total Images</label><input type="number" id="ghTotalImages" class="form-control"></div>
              <div class="form-group" style="flex:1;">
                  <label>Extension</label>
                  <select id="ghExtension" class="form-control">
                      <option value=".jpg">.jpg</option><option value=".webp">.webp</option><option value=".png">.png</option>
                  </select>
              </div>
          </div>
      </div>
      <button class="btn btn-success" id="processChapterBtn" style="margin-top:15px;">Process and Save Chapter</button>
    </div>
    <div id="uploadStatus" class="status-box"></div>
  </div>

  <div class="panel" style="grid-column: 1 / -1;">
    <h3>3. Library Management</h3>
    <div class="comic-list" id="comicList">Synchronizing database...</div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // =================================================================
  const GITHUB_USER = "maxton87667-tech"; 
  const GITHUB_REPO = "Comics";           
  const GITHUB_BRANCH = "main";           
  // =================================================================

  const CLOUD_NAME = "dht22h84x";
  const UPLOAD_PRESET = "comics_preset";
  let currentUploadMode = "github";
  let allComicsData = [];

  let GITHUB_TOKEN = localStorage.getItem("comicpur_gh_token") || "";
  if(GITHUB_TOKEN) { document.getElementById('githubTokenField').value = GITHUB_TOKEN; }

  document.getElementById('saveGhTokenBtn').addEventListener('click', () => {
      const val = document.getElementById('githubTokenField').value.trim();
      if(val) {
          localStorage.setItem("comicpur_gh_token", val);
          GITHUB_TOKEN = val;
          alert("GitHub Token saved securely in browser!");
      } else { alert("Please enter a valid GitHub token."); }
  });

  async function loadSettings() {
      try {
          const snap = await getDoc(doc(db, "settings", "api_keys"));
          if(snap.exists() && snap.data().gplinks) {
              document.getElementById('gpLinksTokenField').value = snap.data().gplinks;
          }
      } catch(e) { console.error("Settings load error:", e); }
  }

  document.getElementById('saveGpTokenBtn').addEventListener('click', async () => {
      const val = document.getElementById('gpLinksTokenField').value.trim();
      const statusBox = document.getElementById('apiKeyStatus');
      if(val) {
          statusBox.style.display = "block"; statusBox.innerText = "Saving API Key...";
          try {
              await setDoc(doc(db, "settings", "api_keys"), { gplinks: val }, { merge: true });
              statusBox.innerText = "GPLinks API Key saved to database successfully!";
              statusBox.style.borderLeftColor = "var(--success)";
          } catch(e) {
              statusBox.innerText = "Database Error: " + e.message;
              statusBox.style.borderLeftColor = "var(--danger)";
          }
      }
  });

  onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.replace("profile.html");
      } else {
          document.getElementById('adminEmailDisplay').innerText = "Admin: " + user.email;
          if (user.email !== "maxton480@gmail.com") {
              alert("Access Denied!"); window.location.replace("profile.html");
          } else {
              loadSettings(); loadComicsRefresh(); 
          }
      }
  });
  
  document.getElementById('logoutBtn').addEventListener('click', () => { signOut(auth); });

  window.setUploadMode = (mode) => {
      currentUploadMode = mode;
      document.getElementById('btnModeCloud').classList.remove('active');
      document.getElementById('btnModeGithub').classList.remove('active');
      document.getElementById('cloudArea').style.display = "none";
      document.getElementById('githubArea').style.display = "none";
      if(mode === 'cloud') {
          document.getElementById('btnModeCloud').classList.add('active');
          document.getElementById('cloudArea').style.display = "block";
      } else {
          document.getElementById('btnModeGithub').classList.add('active');
          document.getElementById('githubArea').style.display = "block";
      }
  };

  document.getElementById('comicCover').addEventListener('input', (e) => {
      const val = e.target.value.trim();
      document.getElementById('formCoverPreview').src = val ? val : "https://via.placeholder.com/70x105?text=No+Cover";
  });

  document.getElementById('selectComic').addEventListener('change', (e) => {
      const id = e.target.value;
      const previewBox = document.getElementById('selectorPreviewBox');
      const managerSection = document.getElementById('chapterManagerSection');
      const uploadSection = document.getElementById('uploadFormSection');
      if(!id) { previewBox.style.display = "none"; managerSection.style.display = "none"; uploadSection.style.display = "none"; return; }
      
      const comic = allComicsData.find(c => c.id === id);
      if(comic) {
          document.getElementById('selectorCoverPreview').src = comic.coverUrl || "https://via.placeholder.com/70x105?text=No+Cover";
          document.getElementById('selectedTitleTxt').innerText = comic.title;
          previewBox.style.display = "flex"; managerSection.style.display = "block"; uploadSection.style.display = "block";
          document.getElementById('ghComicFolder').value = comic.githubFolder || comic.title.toLowerCase().trim().replace(/\s+/g, '-');
          renderChaptersManager(comic);
      }
  });

  function renderChaptersManager(comic) {
      const container = document.getElementById('chapterManagerList'); container.innerHTML = "";
      let eps = comic.episodes || [];
      if(eps.length === 0) { container.innerHTML = `<div style="padding:10px; color:#666; font-size:12px; text-align:center;">No chapters found.</div>`; return; }
      eps.forEach((ep, index) => {
          container.innerHTML += `
             <div class="chapter-item">
                <span>Ch ${index + 1}: <strong>${ep.title || 'Untitled'}</strong> (${ep.urls?.length || 0} pages)</span>
                <div><button class="mini-btn mini-del" onclick="deleteChapter('${comic.id}', ${index})">Delete</button></div>
             </div>`;
      });
  }

  window.deleteChapter = async (comicId, index) => {
      if(confirm("Are you sure you want to erase this chapter?")) {
          const comic = allComicsData.find(c => c.id === comicId);
          if(!comic) return;
          let updatedEps = [...comic.episodes]; updatedEps.splice(index, 1);
          await updateDoc(doc(db, "comics", comicId), { episodes: updatedEps, updatedAt: serverTimestamp() });
          loadComicsRefresh(comicId);
      }
  };

  // ADVANCED GITHUB SYNC WITH DEBUG LOGGING
  window.syncWithGithubRepo = async (comicId) => {
      const statusBox = document.getElementById('globalSyncStatus');
      const comic = allComicsData.find(c => c.id === comicId);
      if(!comic) return;

      if(!GITHUB_TOKEN) {
          statusBox.style.display = "block"; statusBox.style.borderLeftColor = "var(--danger)";
          statusBox.innerText = "Error: GitHub Token is missing. Save token above.";
          window.scrollTo({top: 0, behavior: 'smooth'}); return;
      }

      const folderName = comic.githubFolder || comic.title.toLowerCase().trim().replace(/\s+/g, '-');
      statusBox.style.display = "block"; statusBox.style.borderLeftColor = "var(--primary)";
      statusBox.innerHTML = `Connecting to GitHub [Branch: <b>${GITHUB_BRANCH}</b>] for folder: <b>comics/${folderName}</b>...`;
      window.scrollTo({top: 0, behavior: 'smooth'});

      try {
          // Explicitly appended ?ref= to avoid branch mismatch errors
          const repoUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/comics/${encodeURIComponent(folderName)}?ref=${GITHUB_BRANCH}`;
          const response = await fetch(repoUrl, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
          
          if(!response.ok) {
              if(response.status === 404) {
                  throw new Error(`Folder NOT FOUND (Error 404). Check if 'comics/${folderName}' exists exactly on GitHub branch '${GITHUB_BRANCH}'.`);
              } else if(response.status === 401) {
                  throw new Error(`UNAUTHORIZED (Error 401). Your GitHub Token is invalid, expired, or missing 'repo' permissions.`);
              } else if(response.status === 403) {
                  throw new Error(`FORBIDDEN (Error 403). GitHub rate limit exceeded or token lacks access.`);
              } else {
                  throw new Error(`API Error ${response.status}: ${response.statusText}`);
              }
          }
          
          const items = await response.json();
          let ghChapters = items.filter(item => item.type === "dir");
          if(ghChapters.length === 0) {
              statusBox.style.borderLeftColor = "var(--warning)";
              statusBox.innerText = `Connected successfully! But no chapter folders found inside 'comics/${folderName}'.`; return;
          }

          ghChapters.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));
          let existingEps = comic.episodes || [];
          let newEpisodesAdded = 0;
          statusBox.innerText = `Found ${ghChapters.length} chapters on GitHub. Syncing images...`;

          for (let ghCh of ghChapters) {
              const alreadyExists = existingEps.some(ep => ep.title.toLowerCase().trim() === ghCh.name.toLowerCase().trim());
              if(!alreadyExists) {
                  const chContentRes = await fetch(ghCh.url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
                  if(chContentRes.ok) {
                      const files = await chContentRes.json();
                      let imageFiles = files.filter(f => f.type === "file" && /\.(jpg|jpeg|png|webp)$/i.test(f.name));
                      imageFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));
                      if(imageFiles.length > 0) {
                          existingEps.push({ title: ghCh.name, urls: imageFiles.map(f => f.download_url) });
                          newEpisodesAdded++;
                      }
                  }
              }
          }

          if(newEpisodesAdded > 0) {
              await updateDoc(doc(db, "comics", comicId), { episodes: existingEps, updatedAt: serverTimestamp() });
              statusBox.style.borderLeftColor = "var(--success)"; statusBox.innerText = `Success: Synced ${newEpisodesAdded} new chapters!`;
              loadComicsRefresh();
          } else {
              statusBox.style.borderLeftColor = "var(--warning)"; statusBox.innerText = `Database is already up to date with GitHub!`;
          }
      } catch (err) {
          statusBox.style.borderLeftColor = "var(--danger)";
          statusBox.innerText = `Sync Error: ${err.message}`;
      }
  };

  document.getElementById('saveComicBtn').addEventListener('click', async () => {
      const id = document.getElementById('editComicId').value;
      const title = document.getElementById('comicTitle').value.trim();
      const githubFolder = document.getElementById('githubFolder').value.trim();
      const genre = document.getElementById('comicGenre').value.trim();
      const summary = document.getElementById('comicSummary').value.trim();
      const coverUrl = document.getElementById('comicCover').value.trim();
      const statusBox = document.getElementById('saveStatus');

      if(!title) { alert("Comic title is mandatory!"); return; }
      const comicData = { title, githubFolder, genre, summary, coverUrl, updatedAt: serverTimestamp() };

      try {
          statusBox.style.display = "block"; statusBox.innerText = "Saving data...";
          if(id) { await updateDoc(doc(db, "comics", id), comicData); statusBox.innerText = "Comic updated successfully!"; }
          else {
              comicData.episodes = []; comicData.createdAt = serverTimestamp();
              await addDoc(collection(db, "comics"), comicData); statusBox.innerText = "New comic added successfully!";
          }
          clearForm(); loadComicsRefresh();
      } catch (err) { 
          statusBox.innerText = "Error saving comic: " + err.message; statusBox.style.borderLeftColor = "var(--danger)";
      }
  });

  document.getElementById('processChapterBtn').addEventListener('click', async () => {
      const comicId = document.getElementById('selectComic').value;
      const epTitle = document.getElementById('epTitle').value.trim();
      const statusBox = document.getElementById('uploadStatus');

      if(!comicId || !epTitle) { alert("Fill chapter parameters correctly."); return; }
      statusBox.style.display = "block";
      let finalUrls = [];

      if (currentUploadMode === "github") {
          const folderC = document.getElementById('ghComicFolder').value.trim();
          const folderCh = document.getElementById('ghChapterFolder').value.trim();
          const totalImg = parseInt(document.getElementById('ghTotalImages').value);
          const ext = document.getElementById('ghExtension').value;
          if(!folderC || !folderCh || isNaN(totalImg)) { alert("Check GitHub folder details."); return; }
          
          statusBox.innerText = `Generating links based on ${GITHUB_USER} repo...`;
          for(let i = 1; i <= totalImg; i++) {
              finalUrls.push(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/comics/${encodeURIComponent(folderC)}/${encodeURIComponent(folderCh)}/${i}${ext}`);
          }
      } else {
          const files = document.getElementById('epImages').files;
          if(files.length === 0) { alert("Select images."); return; }
          statusBox.innerText = "Uploading to Cloudinary... Please wait.";
          for (let i = 0; i < files.length; i++) {
              const formData = new FormData(); formData.append("file", files[i]); formData.append("upload_preset", UPLOAD_PRESET);
              try {
                  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
                  const data = await res.json(); finalUrls.push(data.secure_url);
                  statusBox.innerText = `Uploaded ${i + 1} / ${files.length} items...`;
              } catch (err) { console.error(err); }
          }
      }

      try {
          statusBox.innerText = "Writing chapter to database...";
          const comicRef = doc(db, "comics", comicId); const comicObj = allComicsData.find(c => c.id === comicId);
          const newEp = { title: epTitle, urls: finalUrls };
          let updatedEps = comicObj.episodes ? [...comicObj.episodes, newEp] : [newEp];
          await updateDoc(comicRef, { episodes: updatedEps, updatedAt: serverTimestamp() });
          statusBox.innerText = "Chapter mapped successfully!";
          document.getElementById('epTitle').value = ""; document.getElementById('epImages').value = "";
          loadComicsRefresh(comicId);
      } catch (err) { statusBox.innerText = "Execution error: " + err.message; statusBox.style.borderLeftColor = "var(--danger)"; }
  });

  window.jumpToChapters = (comicId) => {
      const selectDropdown = document.getElementById('selectComic');
      selectDropdown.value = comicId; selectDropdown.dispatchEvent(new Event('change'));
      document.getElementById('panelChapterControl').scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  async function loadComicsRefresh(activeSelectorId = "") {
      const list = document.getElementById('comicList'); const select = document.getElementById('selectComic');
      list.innerHTML = "Synchronizing database...";
      try {
          const snapshot = await getDocs(collection(db, "comics"));
          let rawComicsData = [];
          snapshot.forEach(doc => { rawComicsData.push({ id: doc.id, ...doc.data() }); });
          rawComicsData.sort((a, b) => (b.updatedAt?.toMillis() || 0) - (a.updatedAt?.toMillis() || 0));
          allComicsData = rawComicsData;
          list.innerHTML = ""; select.innerHTML = '<option value="">-- Choose Target Comic --</option>';
          if (allComicsData.length === 0) { list.innerHTML = `<div style="padding: 15px; color: #aaa;">No comics found in database. Add a new comic above.</div>`; return; }

          allComicsData.forEach(c => {
              let epCount = c.episodes ? c.episodes.length : 0;
              select.innerHTML += `<option value="${c.id}" ${c.id === activeSelectorId ? 'selected':''}>${c.title} (${epCount} Chapters)</option>`;
              list.innerHTML += `
              <div class="comic-item">
                 <div class="comic-info-layout">
                    <img src="${c.coverUrl || 'https://via.placeholder.com/70x105?text=No+Cover'}" style="width:50px; aspect-ratio:2/3; object-fit:cover; border-radius:4px; border:1px solid rgba(255,255,255,0.1);">
                    <div>
                       <strong>${c.title}</strong><p>Genre: ${c.genre || 'N/A'} | Chapters: ${epCount}</p>
                    </div>
                 </div>
                 <div class="action-btns">
                    <button class="btn-sync" onclick="syncWithGithubRepo('${c.id}')">Sync GitHub</button>
                    <button class="btn-chapters" onclick="jumpToChapters('${c.id}')">Chapters</button>
                    <button class="btn-edit" onclick="editComic('${c.id}')">Edit</button>
                    <button class="btn-delete" onclick="deleteComic('${c.id}')">Delete</button>
                 </div>
              </div>`;
          });

          if(activeSelectorId) {
              const reSelectedComic = allComicsData.find(x => x.id === activeSelectorId);
              if(reSelectedComic) {
                  renderChaptersManager(reSelectedComic);
                  document.getElementById('selectorCoverPreview').src = reSelectedComic.coverUrl || "https://via.placeholder.com/70x105?text=No+Cover";
                  document.getElementById('selectedTitleTxt').innerText = reSelectedComic.title;
              }
          }
      } catch (error) { list.innerHTML = `<div style="padding: 15px; color: var(--danger);">Failed to load comics. Error: ${error.message}</div>`; }
  }

  window.editComic = (id) => {
      const c = allComicsData.find(x => x.id === id); if(!c) return;
      document.getElementById('editComicId').value = c.id; document.getElementById('comicTitle').value = c.title || "";
      document.getElementById('githubFolder').value = c.githubFolder || ""; document.getElementById('comicGenre').value = c.genre || "";
      document.getElementById('comicSummary').value = c.summary || ""; document.getElementById('comicCover').value = c.coverUrl || "";
      document.getElementById('formCoverPreview').src = c.coverUrl ? c.coverUrl : "https://via.placeholder.com/70x105?text=No+Cover";
      document.getElementById('panelTitle').innerText = "Edit Comic"; document.getElementById('saveComicBtn').innerText = "Update Comic Data";
      window.scrollTo({top: 0, behavior: 'smooth'});
  };

  window.deleteComic = async (id) => {
      if(confirm("Delete this comic and all chapters completely?")) {
          try { await deleteDoc(doc(db, "comics", id)); loadComicsRefresh(); } catch(e) { alert("Error deleting comic: " + e.message); }
      }
  };

  window.clearForm = () => {
      document.getElementById('editComicId').value = ""; document.getElementById('comicTitle').value = "";
      document.getElementById('githubFolder').value = ""; document.getElementById('comicGenre').value = "";
      document.getElementById('comicSummary').value = ""; document.getElementById('comicCover').value = "";
      document.getElementById('formCoverPreview').src = "https://via.placeholder.com/70x105?text=No+Cover";
      document.getElementById('panelTitle').innerText = "1. Add New Comic"; document.getElementById('saveComicBtn').innerText = "Save Comic Data";
      document.getElementById('saveStatus').style.display = "none";
  };
</script>
</body>
</html>
