<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comic Pur | Home</title>
<style>
  :root { 
    --primary: #00d4ff; --dark: #070b19; --card-bg: #111827; 
    --danger: #ef4444; --text-muted: #9ca3af;
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background-color: var(--dark); color: white; min-height: 100vh; display: flex; flex-direction: column; }
  
  /* NAVBAR */
  header { 
    background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
    padding: 15px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    display: flex; justify-content: space-between; align-items: center; 
  }
  .brand { font-size: 22px; font-weight: 900; color: white; text-decoration: none; letter-spacing: 1px; }
  .brand span { color: var(--primary); }
  
  .nav-links { display: flex; align-items: center; gap: 15px; }
  
  /* SEARCH ICON STYLE */
  .search-icon {
      color: white; text-decoration: none; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.1); width: 35px; height: 35px; border-radius: 50%; transition: 0.3s;
  }
  .search-icon:hover { background: var(--primary); color: #000; transform: scale(1.1); }
  
  .nav-btn { color: white; text-decoration: none; font-weight: 600; font-size: 14px; padding: 6px 12px; border-radius: 6px; transition: 0.2s; }
  .nav-btn:hover { color: var(--primary); }
  .btn-premium { background: var(--primary); color: #000; font-weight: bold; }
  .btn-premium:hover { color: #000; box-shadow: 0 0 10px rgba(0,212,255,0.4); }

  /* MAIN CONTAINER */
  .container { max-width: 1200px; width: 100%; margin: 0 auto; padding: 20px; flex-grow: 1; }
  .section-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; border-left: 4px solid var(--primary); padding-left: 10px; letter-spacing: 0.5px; }

  /* COMIC GRID SYSTEM (PHONE PAR 2X GRID) */
  .comic-grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 12px; 
  }
  @media(min-width: 600px) { .comic-grid { grid-template-columns: repeat(3, 1fr); gap: 15px; } }
  @media(min-width: 900px) { .comic-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
  @media(min-width: 1100px) { .comic-grid { grid-template-columns: repeat(5, 1fr); } }

  /* COMIC CARD */
  .comic-card { 
    background: var(--card-bg); border-radius: 10px; overflow: hidden; 
    border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s, border-color 0.2s;
    text-decoration: none; color: white; display: flex; flex-direction: column; position: relative;
  }
  .comic-card:hover { transform: translateY(-4px); border-color: rgba(0, 212, 255, 0.3); }
  
  .cover-wrapper { width: 100%; aspect-ratio: 2/3; position: relative; background: #1f2937; }
  .cover-img { width: 100%; height: 100%; object-fit: cover; }
  
  /* 18+ TAG */
  .tag-18 { 
    position: absolute; top: 8px; left: 8px; 
    background: var(--danger); color: white; 
    font-size: 11px; font-weight: 900; padding: 3px 6px; 
    border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.2); z-index: 2;
  }

  .comic-info { padding: 10px; display: flex; flex-direction: column; gap: 4px; flex-grow: 1; }
  .comic-title { font-size: 14px; font-weight: 700; line-height: 1.3; color: #f3f4f6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .comic-meta { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
  .comic-genre { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* LOAD MORE BUTTON & STATES */
  .load-more-container { text-align: center; margin-top: 30px; }
  .btn-load-more { 
      background: transparent; color: var(--primary); border: 2px solid var(--primary); 
      padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
      display: none; /* Initially hidden */
  }
  .btn-load-more:hover { background: var(--primary); color: #000; }
  
  .status-text { text-align: center; color: var(--text-muted); padding: 20px; font-weight: 600; font-size: 15px; grid-column: 1 / -1; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="brand">COMIC <span>PUR</span></a>
  <div class="nav-links">
     <a href="search.html" class="search-icon" title="Search Comics">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
     </a>
     
     <a href="unlock.html" class="nav-btn btn-premium" id="premiumNavStatus">⚡ Get Pass</a>
     <a href="profile.html" class="nav-btn" id="profileBtn">Profile</a>
  </div>
</header>

<div class="container">
  <h2 class="section-title">Latest Updates</h2>
  
  <div class="comic-grid" id="comicsContainer">
     </div>

  <div class="load-more-container">
      <button id="loadMoreBtn" class="btn-load-more" onclick="loadComics(true)">Load More Comics</button>
      <div id="loadingIndicator" class="status-text">Fetching comics...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Check Premium Status
  onAuthStateChanged(auth, async (user) => {
      if(user) {
          try {
              const uSnap = await getDoc(doc(db, "users", user.uid));
              if(uSnap.exists() && uSnap.data().accessExpiresAt > Date.now()) {
                  document.getElementById('premiumNavStatus').innerHTML = "🌟 Premium Active";
                  document.getElementById('premiumNavStatus').style.background = "#10b981"; 
              }
          } catch(e) { console.error(e); }
      }
  });

  // PAGINATION SYSTEM (FAST LOADING)
  let lastVisibleDoc = null;
  const COMICS_PER_PAGE = 10; // Ek baar mein 10 comic load hongi
  
  const container = document.getElementById('comicsContainer');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  const loadingIndicator = document.getElementById('loadingIndicator');

  window.loadComics = async (isLoadMore = false) => {
      loadingIndicator.style.display = "block";
      loadMoreBtn.style.display = "none";
      
      try {
          let comicsQuery;
          
          if(isLoadMore && lastVisibleDoc) {
              // Agli 10 comics layega (jahan se chhoda tha)
              comicsQuery = query(collection(db, "comics"), orderBy("updatedAt", "desc"), startAfter(lastVisibleDoc), limit(COMICS_PER_PAGE));
          } else {
              // Pehli 10 comics layega
              comicsQuery = query(collection(db, "comics"), orderBy("updatedAt", "desc"), limit(COMICS_PER_PAGE));
          }
          
          const snapshot = await getDocs(comicsQuery);
          loadingIndicator.style.display = "none";
          
          if(snapshot.empty && !isLoadMore) {
              container.innerHTML = `<div class="status-text">No comics uploaded yet.</div>`;
              return;
          }

          // Save the last document for next load
          lastVisibleDoc = snapshot.docs[snapshot.docs.length - 1];

          snapshot.forEach(doc => {
              const c = doc.data();
              const comicId = doc.id;
              const epCount = c.episodes ? c.episodes.length : 0;
              
              let adultTag = c.isAdult ? `<span class="tag-18">18+</span>` : "";
              
              container.innerHTML += `
                <a href="comic.html?id=${comicId}" class="comic-card">
                    <div class="cover-wrapper">
                        ${adultTag}
                        <img class="cover-img" src="${c.coverUrl || 'https://via.placeholder.com/200x300?text=No+Cover'}" alt="${c.title}" loading="lazy">
                    </div>
                    <div class="comic-info">
                        <h3 class="comic-title">${c.title}</h3>
                        <div class="comic-meta">
                            <span class="comic-genre">${c.genre || 'Story'}</span>
                            <span>${epCount} Ch</span>
                        </div>
                    </div>
                </a>
              `;
          });

          // Agar data limit ke barabar aaya hai, matlab aage aur bhi comics ho sakti hain
          if(snapshot.docs.length === COMICS_PER_PAGE) {
              loadMoreBtn.style.display = "inline-block";
          } else {
              loadMoreBtn.style.display = "none"; // Saari comics khatam
          }
          
      } catch (err) {
          console.error("Library load error:", err);
          loadingIndicator.style.display = "none";
          if(!isLoadMore) {
              container.innerHTML = `<div class="status-text" style="color:var(--danger)">Failed to synchronize database.</div>`;
          }
      }
  };

  // Start on load
  loadComics(false);
</script>
</body>
</html>
