<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search Comics | Comic Pur</title>
<style>
  :root { 
    --primary: #00d4ff; --dark: #070b19; --card-bg: #111827; 
    --danger: #ef4444; --text-muted: #9ca3af;
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background-color: var(--dark); color: white; min-height: 100vh; display: flex; flex-direction: column; }
  
  /* NAVBAR */
  header { 
    background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
    padding: 15px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    display: flex; justify-content: space-between; align-items: center; 
  }
  .brand { font-size: 22px; font-weight: 900; color: white; text-decoration: none; letter-spacing: 1px; }
  .brand span { color: var(--primary); }
  
  .nav-links { display: flex; align-items: center; gap: 15px; }
  .nav-btn { color: white; text-decoration: none; font-weight: 600; font-size: 14px; padding: 6px 12px; border-radius: 6px; transition: 0.2s; }
  .nav-btn:hover { color: var(--primary); }

  /* SEARCH BAR SECTION */
  .search-container { max-width: 800px; width: 100%; margin: 30px auto 20px auto; padding: 0 20px; }
  .search-input-wrapper { position: relative; width: 100%; }
  .search-input { 
    width: 100%; padding: 15px 20px; font-size: 16px; 
    background: var(--card-bg); color: white; 
    border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; 
    outline: none; transition: 0.3s; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .search-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,212,255,0.2); }
  .search-input::placeholder { color: #888; }

  /* MAIN CONTAINER */
  .container { max-width: 1200px; width: 100%; margin: 0 auto; padding: 20px; flex-grow: 1; }
  .results-title { font-size: 16px; font-weight: 600; color: var(--text-muted); margin-bottom: 20px; }

  /* COMIC GRID SYSTEM (PHONE PAR 2X GRID) */
  .comic-grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 12px; 
  }
  @media(min-width: 600px) { .comic-grid { grid-template-columns: repeat(3, 1fr); gap: 15px; } }
  @media(min-width: 900px) { .comic-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
  @media(min-width: 1100px) { .comic-grid { grid-template-columns: repeat(5, 1fr); } }

  /* COMIC CARD */
  .comic-card { 
    background: var(--card-bg); border-radius: 10px; overflow: hidden; 
    border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s, border-color 0.2s;
    text-decoration: none; color: white; display: flex; flex-direction: column; position: relative;
  }
  .comic-card:hover { transform: translateY(-4px); border-color: rgba(0, 212, 255, 0.3); }
  
  .cover-wrapper { width: 100%; aspect-ratio: 2/3; position: relative; background: #1f2937; }
  .cover-img { width: 100%; height: 100%; object-fit: cover; }
  
  /* 🔥 18+ TAG STYLE 🔥 */
  .tag-18 { 
    position: absolute; top: 8px; left: 8px; 
    background: var(--danger); color: white; 
    font-size: 11px; font-weight: 900; padding: 3px 6px; 
    border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.2);
    z-index: 2;
  }

  .comic-info { padding: 10px; display: flex; flex-direction: column; gap: 4px; flex-grow: 1; }
  .comic-title { font-size: 14px; font-weight: 700; line-height: 1.3; color: #f3f4f6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .comic-meta { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
  .comic-genre { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* STATES */
  .status-text { text-align: center; color: var(--text-muted); padding: 40px; font-weight: 600; font-size: 15px; grid-column: 1 / -1; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="brand">COMIC <span>PUR</span></a>
  <div class="nav-links">
     <a href="index.html" class="nav-btn">← Home</a>
  </div>
</header>

<div class="search-container">
    <div class="search-input-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Search for comics, romance, action...">
    </div>
</div>

<div class="container">
  <div id="resultsTitle" class="results-title">Showing all comics</div>
  
  <div class="comic-grid" id="comicsContainer">
     <div class="status-text">Loading library...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allComicsData = [];
  const container = document.getElementById('comicsContainer');
  const searchInput = document.getElementById('searchInput');
  const resultsTitle = document.getElementById('resultsTitle');

  // Load all comics once for instant filtering
  async function fetchAllComics() {
      try {
          const snapshot = await getDocs(collection(db, "comics"));
          
          if(snapshot.empty) {
              container.innerHTML = `<div class="status-text">No comics found in database.</div>`;
              return;
          }
          
          snapshot.forEach(doc => {
              allComicsData.push({ id: doc.id, ...doc.data() });
          });

          // Sort recently updated first
          allComicsData.sort((a, b) => (b.updatedAt?.toMillis() || 0) - (a.updatedAt?.toMillis() || 0));
          
          renderComics(allComicsData);
          
      } catch (err) {
          console.error("Library load error:", err);
          container.innerHTML = `<div class="status-text" style="color:var(--danger)">Database connection error.</div>`;
      }
  }

  // Render function
  function renderComics(comicsArray) {
      container.innerHTML = "";
      
      if(comicsArray.length === 0) {
          container.innerHTML = `<div class="status-text">No matching comics found. Try a different name.</div>`;
          return;
      }
      
      comicsArray.forEach(c => {
          const epCount = c.episodes ? c.episodes.length : 0;
          
          // 🔥 18+ TAG LOGIC 🔥
          let adultTag = c.isAdult ? `<span class="tag-18">18+</span>` : "";
          
          container.innerHTML += `
            <a href="comic.html?id=${c.id}" class="comic-card">
                <div class="cover-wrapper">
                    ${adultTag}
                    <img class="cover-img" src="${c.coverUrl || 'https://via.placeholder.com/200x300?text=No+Cover'}" alt="${c.title}" loading="lazy">
                </div>
                <div class="comic-info">
                    <h3 class="comic-title">${c.title}</h3>
                    <div class="comic-meta">
                        <span class="comic-genre">${c.genre || 'Story'}</span>
                        <span>${epCount} Ch</span>
                    </div>
                </div>
            </a>
          `;
      });
  }

  // Live Search Input Listener
  searchInput.addEventListener('input', (e) => {
      const searchTerm = e.target.value.toLowerCase().trim();
      
      if(searchTerm === "") {
          resultsTitle.innerText = "Showing all comics";
          renderComics(allComicsData);
          return;
      }
      
      resultsTitle.innerText = `Search results for "${searchTerm}"`;
      
      // Filter by Title or Genre
      const filteredComics = allComicsData.filter(c => {
          const titleMatch = c.title ? c.title.toLowerCase().includes(searchTerm) : false;
          const genreMatch = c.genre ? c.genre.toLowerCase().includes(searchTerm) : false;
          return titleMatch || genreMatch;
      });
      
      renderComics(filteredComics);
  });

  // Init
  fetchAllComics();
</script>
</body>
</html>
