<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile | Comic Pur</title>
<style>
  :root { --primary: #00d4ff; --dark: #070b19; --card-bg: #111827; --danger: #ef4444; }
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background-color: var(--dark); color: white; min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(7, 11, 25, 0.95); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
  .logo-link { display: flex; align-items: center; text-decoration: none; }
  .site-logo { height: 32px; width: auto; object-fit: contain; filter: drop-shadow(0 0 5px rgba(0, 212, 255, 0.3)); }
  .back-btn { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 6px 15px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; text-decoration: none; }

  /* CONTAINER */
  .main-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
  .auth-card { background: var(--card-bg); border: 1px solid rgba(0, 212, 255, 0.15); padding: 35px 25px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .card-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 25px; color: white; }
  .card-title span { color: var(--primary); }

  /* FORMS */
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #aaa; }
  .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 14px; transition: 0.3s; }
  .form-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(0,212,255,0.2); }

  .action-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--primary); color: #000; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }
  .action-btn:hover { background: #00b8e6; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
  .action-btn:disabled { background: #333; color: #888; cursor: not-allowed; }

  .switch-text { text-align: center; font-size: 13px; color: #aaa; margin-top: 20px; }
  .switch-link { color: var(--primary); text-decoration: none; font-weight: bold; cursor: pointer; }

  /* STATUS MESSAGES */
  .msg-box { padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 15px; display: none; }
  .msg-error { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
  .msg-success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; }

  /* PROFILE DASHBOARD (WHEN LOGGED IN) */
  .profile-box { text-align: center; }
  .user-email { font-size: 15px; color: #aaa; margin-bottom: 15px; word-break: break-all; }
  .pass-status { background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 25px; }
  .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; margin-top: 5px; }
  .badge-active { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
  .badge-expired { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
  
  .loader { border: 2px solid rgba(0,0,0,0.1); border-top: 2px solid #000; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: none; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo-link">
      <img src="https://raw.githubusercontent.com/maxton87667-tech/Comics/refs/heads/main/assets/logo-circle.png" class="site-logo" alt="Comic Pur">
  </a>
  <a href="index.html" class="back-btn">Home</a>
</header>

<div class="main-container">
  <div class="auth-card">
      <div id="msgBox" class="msg-box"></div>

      <div id="loginFormSection">
          <h2 class="card-title">Welcome <span>Back</span></h2>
          <form id="loginForm" onsubmit="handleLogin(event)">
              <div class="form-group">
                  <label>Email Address</label>
                  <input type="email" id="loginEmail" class="form-input" required placeholder="name@example.com">
              </div>
              <div class="form-group">
                  <label>Password</label>
                  <input type="password" id="loginPassword" class="form-input" required placeholder="••••••••">
              </div>
              <button type="submit" class="action-btn" id="loginBtn">
                  <span>Sign In</span> <div class="loader" id="loginLoader"></div>
              </button>
          </form>
          <p class="switch-text">New to Comic Pur? <span class="switch-link" onclick="toggleAuthMode(false)">Create Account</span></p>
      </div>

      <div id="signupFormSection" style="display: none;">
          <h2 class="card-title">Create <span>Account</span></h2>
          <form id="signupForm" onsubmit="handleSignup(event)">
              <div class="form-group">
                  <label>Choose Username</label>
                  <input type="text" id="signupUsername" class="form-input" required placeholder="john_doe">
              </div>
              <div class="form-group">
                  <label>Email Address</label>
                  <input type="email" id="signupEmail" class="form-input" required placeholder="name@example.com">
              </div>
              <div class="form-group">
                  <label>Password</label>
                  <input type="password" id="signupPassword" class="form-input" required placeholder="Min 6 characters">
              </div>
              <button type="submit" class="action-btn" id="signupBtn">
                  <span>Register</span> <div class="loader" id="signupLoader"></div>
              </button>
          </form>
          <p class="switch-text">Already have an account? <span class="switch-link" onclick="toggleAuthMode(true)">Sign In</span></p>
      </div>

      <div id="profileSection" style="display: none;">
          <h2 class="card-title">Hello, <span id="displayUsername">Reader</span></h2>
          <div class="profile-box">
              <p class="user-email" id="displayEmail">loading...</p>
              
              <div class="pass-status">
                  <div style="font-size: 13px; color: #aaa;">24-Hour Premium Pass Status:</div>
                  <div id="passBadge" class="status-badge">Checking...</div>
                  <div style="font-size: 11px; color:#666; margin-top: 8px;" id="expiryTimeText"></div>
              </div>

              <button class="action-btn" onclick="handleLogout()" style="background:transparent; color:var(--danger); border:1px solid var(--danger);">Sign Out</button>
          </div>
      </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAct9qGdPor_WyQ5k9Gad6HYRi_5Z_Tb_A",
      authDomain: "comicpur-e6725.firebaseapp.com",
      projectId: "comicpur-e6725",
      appId: "1:976881280643:web:0e629c3331feae72f49db6"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const msgBox = document.getElementById('msgBox');
  let isLoginMode = true;

  function showMessage(text, type) {
      msgBox.style.display = "block";
      msgBox.className = `msg-box msg-${type}`;
      msgBox.innerText = text;
  }
  function hideMessage() { msgBox.style.display = "none"; }

  // 1. SWITCH BETWEEN LOGIN & SIGNUP UI CLEANLY
  window.toggleAuthMode = (showLogin) => {
      hideMessage();
      isLoginMode = showLogin;
      document.getElementById('loginFormSection').style.display = showLogin ? "block" : "none";
      document.getElementById('signupFormSection').style.display = showLogin ? "none" : "block";
  };

  // 2. AUTH STATE MONITOR (Auto-Redirects & UI Updates)
  onAuthStateChanged(auth, async (user) => {
      if (user) {
          // User logged in hai -> UI forms chhupao, Dashboard dikhao
          document.getElementById('loginFormSection').style.display = "none";
          document.getElementById('signupFormSection').style.display = "none";
          document.getElementById('profileSection').style.display = "block";
          
          document.getElementById('displayEmail').innerText = user.email;

          try {
              const userRef = doc(db, "users", user.uid);
              const userSnap = await getDoc(userRef);
              
              if(userSnap.exists()) {
                  const data = userSnap.data();
                  document.getElementById('displayUsername').innerText = data.username || "Reader";
                  
                  // Premium Pass Check
                  const expiry = data.accessExpiresAt || 0;
                  const badge = document.getElementById('passBadge');
                  const expiryText = document.getElementById('expiryTimeText');

                  if (expiry > Date.now()) {
                      badge.innerText = "Active";
                      badge.className = "status-badge badge-active";
                      const dateObj = new Date(expiry);
                      expiryText.innerText = "Expires at: " + dateObj.toLocaleTimeString() + " (" + dateObj.toLocaleDateString() + ")";
                  } else {
                      badge.innerText = "No Active Pass";
                      badge.className = "status-badge badge-expired";
                      expiryText.innerText = "Go to unlock page to get a 24h free pass.";
                  }
              }
          } catch(e) { console.error("Profile data sync error:", e); }
      } else {
          // User logged out hai -> Forms dikhao
          document.getElementById('profileSection').style.display = "none";
          toggleAuthMode(isLoginMode);
      }
  });

  // 3. FIXED: SIGN UP WITH AUTOMATIC AUTO-LOGIN & REDIRECT (1 Click Only)
  window.handleSignup = async (e) => {
      e.preventDefault(); // Prevents page reload
      hideMessage();

      const username = document.getElementById('signupUsername').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;

      const btn = document.getElementById('signupBtn');
      const loader = document.getElementById('signupLoader');

      btn.disabled = true;
      loader.style.display = "inline-block";

      try {
          // Firebase account creation
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          const user = userCredential.user;

          // Save Username and default pass data to Firestore
          await setDoc(doc(db, "users", user.uid), {
              username: username,
              email: email,
              accessExpiresAt: 0, // Initial status: No pass
              createdAt: Date.now()
          });

          showMessage("Account created! Redirecting...", "success");
          
          // 🔥 FIX: No manual login needed. Redirecting directly since Firebase auto-logs in!
          setTimeout(() => { window.location.href = "index.html"; }, 1500);

      } catch (error) {
          console.error(error);
          btn.disabled = false;
          loader.style.display = "none";
          
          // Clean error messages for users
          if (error.code === 'auth/email-already-in-check' || error.code === 'auth/email-already-in-use') {
              showMessage("This email is already registered.", "error");
          } else if (error.code === 'auth/weak-password') {
              showMessage("Password should be at least 6 characters.", "error");
          } else {
              showMessage(error.message, "error");
          }
      }
  };

  // 4. FIXED: LOGIN HANDLER (1 Click Only)
  window.handleLogin = async (e) => {
      e.preventDefault();
      hideMessage();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      const btn = document.getElementById('loginBtn');
      const loader = document.getElementById('loginLoader');

      btn.disabled = true;
      loader.style.display = "inline-block";

      try {
          await signInWithEmailAndPassword(auth, email, password);
          showMessage("Login successful! Redirecting...", "success");
          setTimeout(() => { window.location.href = "index.html"; }, 1200);
      } catch (error) {
          console.error(error);
          btn.disabled = false;
          loader.style.display = "none";
          showMessage("Invalid email or password. Please try again.", "error");
      }
  };

  // 5. LOGOUT HANDLER
  window.handleLogout = async () => {
      try {
          await signOut(auth);
          window.location.reload();
      } catch(e) { showMessage("Error signing out.", "error"); }
  };
</script>
</body>
</html>
